<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GWA Calculator</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary-bg: #000000;
      --secondary-bg: #121212;
      --card-bg: #1a1a1a;
      --border-color: #2f2f2f;
      --text-primary: #ffffff;
      --text-secondary: #a8a8a8;
      --accent: #0095f6;
      --accent-hover: #0081d6;
      --success: #00d95f;
      --danger: #ed4956;
      --radius: 12px;
      --radius-lg: 16px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: var(--primary-bg);
      color: var(--text-primary);
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    .header {
      width: 100%;
      max-width: 600px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid var(--border-color);
    }

    .header h1 {
      font-size: 22px;
      font-weight: 600;
    }

    .header-actions {
      display: flex;
      gap: 15px;
    }

    .icon-btn {
      background: none;
      border: none;
      color: var(--text-primary);
      font-size: 18px;
      cursor: pointer;
      padding: 5px;
      border-radius: 50%;
      transition: background-color 0.2s;
    }

    .icon-btn:hover {
      background-color: rgba(255, 255, 255, 0.1);
    }

    .container {
      width: 100%;
      max-width: 600px;
      background: var(--card-bg);
      border-radius: var(--radius-lg);
      overflow: hidden;
      border: 1px solid var(--border-color);
      margin-bottom: 20px;
    }

    .stats-bar {
      display: flex;
      justify-content: space-around;
      padding: 15px;
      background: var(--secondary-bg);
      border-bottom: 1px solid var(--border-color);
    }

    .stat {
      text-align: center;
    }

    .stat-value {
      font-size: 20px;
      font-weight: 600;
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .subjects-container {
      padding: 15px;
    }

    .subject {
      background: var(--secondary-bg);
      padding: 15px;
      border-radius: var(--radius);
      margin-bottom: 15px;
      border: 1px solid var(--border-color);
      transition: all 0.2s ease;
    }

    .subject:hover {
      border-color: var(--accent);
    }

    .subject-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .subject-title {
      font-size: 16px;
      font-weight: 600;
    }

    .delete-btn {
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 14px;
      transition: color 0.2s;
    }

    .delete-btn:hover {
      color: var(--danger);
    }

    .grades-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .grade-input {
      position: relative;
    }

    .grade-input label {
      display: block;
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 5px;
    }

    .grade-input input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      background: var(--card-bg);
      color: var(--text-primary);
      font-size: 14px;
      transition: border-color 0.2s;
    }

    .grade-input input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .grade-input input::placeholder {
      color: var(--text-secondary);
    }

    .actions {
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      border-top: 1px solid var(--border-color);
    }

    .btn {
      padding: 12px;
      border: none;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
    }

    .btn-secondary {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--border-color);
    }

    .btn-secondary:hover {
      background: rgba(0, 149, 246, 0.1);
    }

    .result-container {
      padding: 20px;
      text-align: center;
      background: var(--secondary-bg);
      border-radius: var(--radius-lg);
      margin-top: 20px;
      border: 1px solid var(--border-color);
      display: none;
    }

    .result-container.show {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    .result-title {
      font-size: 16px;
      color: var(--text-secondary);
      margin-bottom: 10px;
    }

    .result-value {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 15px;
    }

    .result-grade {
      font-size: 18px;
      padding: 8px 16px;
      border-radius: 20px;
      display: inline-block;
      font-weight: 600;
    }

    .grade-excellent {
      background: rgba(0, 217, 95, 0.2);
      color: var(--success);
    }

    .grade-good {
      background: rgba(0, 149, 246, 0.2);
      color: var(--accent);
    }

    .grade-average {
      background: rgba(255, 193, 7, 0.2);
      color: #ffc107;
    }

    .grade-poor {
      background: rgba(237, 73, 86, 0.2);
      color: var(--danger);
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-secondary);
    }

    .empty-state i {
      font-size: 48px;
      margin-bottom: 15px;
      opacity: 0.5;
    }

    .empty-state p {
      margin-bottom: 20px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .grades-grid {
        grid-template-columns: 1fr;
      }
      
      .header h1 {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>GWA Calculator</h1>
    <div class="header-actions">
      <button class="icon-btn" onclick="toggleTheme()">
        <i class="fas fa-moon"></i>
      </button>
      <button class="icon-btn" onclick="resetAll()">
        <i class="fas fa-trash"></i>
      </button>
    </div>
  </div>

  <div class="container">
    <div class="stats-bar">
      <div class="stat">
        <div class="stat-value" id="subjectCount">0</div>
        <div class="stat-label">Subjects</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="completedCount">0</div>
        <div class="stat-label">Completed</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="averageGrade">-</div>
        <div class="stat-label">Average</div>
      </div>
    </div>

    <div class="subjects-container" id="subjects">
      <div class="empty-state" id="emptyState">
        <i class="fas fa-book-open"></i>
        <p>No subjects added yet</p>
        <button class="btn btn-primary" onclick="addSubject()">
          <i class="fas fa-plus"></i> Add Your First Subject
        </button>
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-secondary" onclick="addSubject()">
        <i class="fas fa-plus"></i> Add Subject
      </button>
      <button class="btn btn-primary" onclick="calculateGWA()">
        <i class="fas fa-calculator"></i> Calculate GWA
      </button>
    </div>
  </div>

  <div class="result-container" id="gwaResult">
    <div class="result-title">Your General Weighted Average</div>
    <div class="result-value" id="gwaValue">-</div>
    <div class="result-grade" id="gradeCategory">-</div>
  </div>

  <script>
    let subjectCount = 0;
    let isDarkMode = true;

    function addSubject() {
      subjectCount++;
      
      // Hide empty state
      document.getElementById('emptyState').style.display = 'none';
      
      const container = document.getElementById("subjects");
      const div = document.createElement("div");
      div.className = "subject";
      div.id = "subject-" + subjectCount;

      div.innerHTML = `
        <div class="subject-header">
          <div class="subject-title">Subject ${subjectCount}</div>
          <button class="delete-btn" onclick="removeSubject(${subjectCount})">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div class="grades-grid">
          <div class="grade-input">
            <label for="prelim-${subjectCount}">Prelim (20%)</label>
            <input type="number" id="prelim-${subjectCount}" placeholder="Enter grade" min="0" max="100" oninput="updateStats()">
          </div>
          <div class="grade-input">
            <label for="midterm-${subjectCount}">Midterm (20%)</label>
            <input type="number" id="midterm-${subjectCount}" placeholder="Enter grade" min="0" max="100" oninput="updateStats()">
          </div>
          <div class="grade-input">
            <label for="prefinal-${subjectCount}">Prefinal (20%)</label>
            <input type="number" id="prefinal-${subjectCount}" placeholder="Enter grade" min="0" max="100" oninput="updateStats()">
          </div>
          <div class="grade-input">
            <label for="final-${subjectCount}">Final (40%)</label>
            <input type="number" id="final-${subjectCount}" placeholder="Enter grade" min="0" max="100" oninput="updateStats()">
          </div>
        </div>
      `;

      container.appendChild(div);
      updateStats();
    }

    function removeSubject(id) {
      const subject = document.getElementById(`subject-${id}`);
      if (subject) {
        subject.remove();
        subjectCount--;
        
        // Update subject numbers
        const subjects = document.querySelectorAll('.subject');
        if (subjects.length === 0) {
          document.getElementById('emptyState').style.display = 'block';
        } else {
          subjects.forEach((subject, index) => {
            const title = subject.querySelector('.subject-title');
            title.textContent = `Subject ${index + 1}`;
          });
        }
        
        updateStats();
      }
    }

    function updateStats() {
      const subjects = document.querySelectorAll('.subject');
      const subjectCountElement = document.getElementById('subjectCount');
      const completedCountElement = document.getElementById('completedCount');
      const averageGradeElement = document.getElementById('averageGrade');
      
      subjectCountElement.textContent = subjects.length;
      
      let completed = 0;
      let totalGrade = 0;
      let count = 0;
      
      subjects.forEach(sub => {
        const prelim = parseFloat(sub.querySelector('input:nth-child(2)').value) || 0;
        const midterm = parseFloat(sub.querySelector('input:nth-child(4)').value) || 0;
        const prefinal = parseFloat(sub.querySelector('input:nth-child(6)').value) || 0;
        const finals = parseFloat(sub.querySelector('input:nth-child(8)').value) || 0;
        
        // Check if all grades are filled
        if (prelim > 0 && midterm > 0 && prefinal > 0 && finals > 0) {
          completed++;
          const finalGrade = (prelim * 0.20) + (midterm * 0.20) + (prefinal * 0.20) + (finals * 0.40);
          totalGrade += finalGrade;
          count++;
        }
      });
      
      completedCountElement.textContent = completed;
      
      if (count > 0) {
        const average = (totalGrade / count).toFixed(1);
        averageGradeElement.textContent = average;
      } else {
        averageGradeElement.textContent = '-';
      }
    }

    function calculateGWA() {
      const subjects = document.querySelectorAll('.subject');
      let total = 0;
      let count = 0;

      subjects.forEach(sub => {
        const prelim = parseFloat(sub.querySelector('input:nth-child(2)').value) || 0;
        const midterm = parseFloat(sub.querySelector('input:nth-child(4)').value) || 0;
        const prefinal = parseFloat(sub.querySelector('input:nth-child(6)').value) || 0;
        const finals = parseFloat(sub.querySelector('input:nth-child(8)').value) || 0;

        const finalGrade = (prelim * 0.20) + (midterm * 0.20) + (prefinal * 0.20) + (finals * 0.40);
        total += finalGrade;
        count++;
      });

      if (count === 0) {
        alert("Please add at least one subject with grades.");
        return;
      }

      const gwa = (total / count).toFixed(2);
      const resultContainer = document.getElementById("gwaResult");
      const gwaValue = document.getElementById("gwaValue");
      const gradeCategory = document.getElementById("gradeCategory");
      
      gwaValue.textContent = gwa;
      
      // Determine grade category
      let category, categoryClass;
      if (gwa >= 90) {
        category = "Excellent";
        categoryClass = "grade-excellent";
      } else if (gwa >= 80) {
        category = "Very Good";
        categoryClass = "grade-good";
      } else if (gwa >= 75) {
        category = "Satisfactory";
        categoryClass = "grade-average";
      } else {
        category = "Needs Improvement";
        categoryClass = "grade-poor";
      }
      
      gradeCategory.textContent = category;
      gradeCategory.className = "result-grade " + categoryClass;
      
      resultContainer.classList.add("show");
    }

    function toggleTheme() {
      isDarkMode = !isDarkMode;
      const root = document.documentElement;
      const icon = document.querySelector('.fa-moon');
      
      if (isDarkMode) {
        root.style.setProperty('--primary-bg', '#000000');
        root.style.setProperty('--secondary-bg', '#121212');
        root.style.setProperty('--card-bg', '#1a1a1a');
        root.style.setProperty('--text-primary', '#ffffff');
        icon.classList.remove('fa-sun');
        icon.classList.add('fa-moon');
      } else {
        root.style.setProperty('--primary-bg', '#fafafa');
        root.style.setProperty('--secondary-bg', '#ffffff');
        root.style.setProperty('--card-bg', '#ffffff');
        root.style.setProperty('--text-primary', '#262626');
        icon.classList.remove('fa-moon');
        icon.classList.add('fa-sun');
      }
    }

    function resetAll() {
      if (confirm("Are you sure you want to remove all subjects?")) {
        const subjectsContainer = document.getElementById("subjects");
        subjectsContainer.innerHTML = '';
        subjectCount = 0;
        
        document.getElementById('emptyState').style.display = 'block';
        document.getElementById('gwaResult').classList.remove('show');
        updateStats();
      }
    }
  </script>
</body>
</html>
